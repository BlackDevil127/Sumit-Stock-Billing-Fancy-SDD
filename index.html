<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fancy Looks Salon | POS (Offline)</title>
<style>
  :root { --primary:#6366f1; --secondary:#a855f7; --sidebar-bg:#0f172a; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#f8fafc; color:#1e293b; }
  .sidebar { background:var(--sidebar-bg); width:260px; position:fixed; top:0; left:0; height:100vh; padding:24px; transition:.3s; z-index:1000; overflow-y:auto; }
  .main { margin-left:260px; padding:24px; }
  @media (max-width:900px){ .sidebar{ transform:translateX(-100%); } .sidebar.open{ transform:translateX(0); } .main{ margin-left:0; } }
  .brand { display:flex; align-items:center; gap:10px; color:#fff; margin-bottom:28px; }
  .brand .logo { width:42px; height:42px; border-radius:14px; background:linear-gradient(135deg,var(--primary),var(--secondary)); display:flex; align-items:center; justify-content:center; font-size:20px; }
  .brand h1 { font-size:18px; margin:0; font-weight:800; }
  .nav-item { display:flex; align-items:center; gap:12px; width:100%; padding:13px 14px; border:none; background:transparent; color:#94a3b8; border-radius:14px; font-weight:700; font-size:14px; cursor:pointer; margin-bottom:8px; text-align:left; }
  .nav-item.active { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:#fff; }
  .nav-item:hover:not(.active) { background:rgba(255,255,255,.06); }
  .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; gap:12px; flex-wrap:wrap; }
  .topbar h2 { margin:0; font-size:22px; font-weight:800; text-transform:capitalize; }
  .hamburger { display:none; width:40px; height:40px; border-radius:10px; background:#fff; border:1px solid #e2e8f0; font-size:18px; cursor:pointer; }
  @media (max-width:900px){ .hamburger{ display:block; } }
  .card { background:rgba(255,255,255,.95); border:1px solid #e2e8f0; border-radius:18px; padding:20px; }
  .grid { display:grid; gap:16px; }
  .grid-4 { grid-template-columns:repeat(4,1fr); } .grid-3{grid-template-columns:repeat(3,1fr);} .grid-2{grid-template-columns:repeat(2,1fr);}
  @media (max-width:900px){ .grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:1fr;} .grid-2{grid-template-columns:1fr;} }
  .billing-layout { display:grid; grid-template-columns:2.4fr 1fr; gap:20px; }
  @media (max-width:900px){ .billing-layout{ grid-template-columns:1fr; } }
  input, .input { width:100%; padding:12px 14px; border:1px solid #e2e8f0; border-radius:12px; font-size:13px; background:#f8fafc; outline:none; }
  input:focus { border-color:var(--primary); }
  .btn { border:none; cursor:pointer; border-radius:12px; font-weight:800; padding:12px 18px; font-size:13px; }
  .btn-primary { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:#fff; }
  .btn-light { background:#f1f5f9; color:#475569; }
  .btn-danger { background:#fee2e2; color:#b91c1c; }
  .btn-danger:hover { background:#ef4444; color:#fff; }
  .btn-green { background:#dcfce7; color:#15803d; }
  .btn-green:hover { background:#22c55e; color:#fff; }
  .btn-orange { background:#ffedd5; color:#c2410c; }
  .btn-orange:hover { background:#f97316; color:#fff; }
  .btn-blue { background:#dbeafe; color:#1d4ed8; }
  .btn-blue:hover { background:#3b82f6; color:#fff; }
  .icon-btn { width:32px; height:32px; border-radius:8px; display:inline-flex; align-items:center; justify-content:center; font-size:13px; border:none; cursor:pointer; }
  table { width:100%; border-collapse:separate; border-spacing:0 8px; font-size:13px; }
  th { background:#1e293b; color:#fff; text-align:left; padding:12px; font-size:11px; text-transform:uppercase; }
  th:first-child, td:first-child { border-radius:10px 0 0 10px; }
  th:last-child, td:last-child { border-radius:0 10px 10px 0; }
  td { background:#fff; padding:12px; border:1px solid #e2e8f0; border-left:none; border-right:none; }
  .pulse-red { animation:pulseRed 1.5s infinite; border:2px solid #ef4444 !important; }
  .pulse-green { animation:pulseGreen 2s infinite; border:2px solid #22c55e !important; }
  @keyframes pulseRed { 0%{box-shadow:0 0 0 0 rgba(239,68,68,.5);} 70%{box-shadow:0 0 0 10px rgba(239,68,68,0);} 100%{box-shadow:0 0 0 0 rgba(239,68,68,0);} }
  @keyframes pulseGreen { 0%{box-shadow:0 0 0 0 rgba(34,197,94,.3);} 70%{box-shadow:0 0 0 8px rgba(34,197,94,0);} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0);} }
  .product-card { background:#fff; border-radius:16px; padding:14px; cursor:pointer; border:2px solid #e2e8f0; }
  .product-card .pname { font-weight:800; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .product-card .psize { font-size:10px; color:#64748b; text-transform:uppercase; font-weight:700; margin:2px 0 10px; }
  .product-card .prow { display:flex; justify-content:space-between; align-items:center; border-top:1px solid #e2e8f0; padding-top:8px; }
  .price { color:var(--primary); font-weight:900; }
  .badge { font-size:10px; padding:2px 8px; border-radius:6px; color:#fff; font-weight:800; }
  .badge-red { background:#dc2626; } .badge-green { background:#16a34a; }
  .stat { display:flex; gap:14px; align-items:center; }
  .stat .ic { width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:18px; border:1px solid #e2e8f0; }
  .stat .lbl { font-size:10px; color:#94a3b8; text-transform:uppercase; font-weight:800; }
  .stat .val { font-size:18px; font-weight:900; }
  .cart-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #f1f5f9; font-size:12px; }
  .modal-bg { position:fixed; inset:0; background:rgba(15,23,42,.6); display:flex; align-items:center; justify-content:center; z-index:2000; padding:16px; }
  .modal-box { background:#fff; border-radius:24px; padding:28px; width:100%; max-width:380px; text-align:center; }
  .chat-wrap { background:#fff; border-radius:20px; display:flex; flex-direction:column; height:78vh; overflow:hidden; border:1px solid #e2e8f0; }
  .chat-head { padding:16px 20px; border-bottom:1px solid #e2e8f0; display:flex; gap:12px; align-items:center; background:#f8fafc; }
  .chat-avatar { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--secondary)); display:flex; align-items:center; justify-content:center; font-size:20px; }
  .chips { display:flex; gap:8px; padding:10px 16px; border-bottom:1px solid #e2e8f0; overflow-x:auto; white-space:nowrap; }
  .chip { font-size:11px; padding:6px 12px; border-radius:20px; border:1px solid #cbd5e1; background:#fff; cursor:pointer; }
  .chat-body { flex:1; padding:20px; overflow-y:auto; background:#f8fafc; }
  .bubble { max-width:80%; padding:12px 16px; border-radius:18px; font-size:13px; line-height:1.6; margin-bottom:10px; }
  .bubble-user { background:#f1f5f9; border:1px solid #e2e8f0; margin-left:auto; font-weight:600; border-bottom-right-radius:4px; }
  .bubble-ai-wrap { display:flex; align-items:flex-start; gap:8px; }
  .bubble-ai { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:#fff; border-bottom-left-radius:4px; }
  .ai-mini { width:30px; height:30px; border-radius:50%; background:#fff; color:var(--primary); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .chat-foot { padding:14px; border-top:1px solid #e2e8f0; display:flex; gap:10px; background:#fff; }
  .warn-banner { position:fixed; top:0; left:0; right:0; background:#fef3c7; color:#92400e; padding:10px 16px; font-size:12px; font-weight:700; text-align:center; z-index:1500; }
  .empty { text-align:center; padding:40px; color:#94a3b8; font-weight:700; }
  .truncate { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:140px; display:inline-block; }
</style>
</head>
<body>
<div id="root"></div>

<script>
// ===================== Fancy Looks POS — fully offline, no CDN/internet needed =====================
const STORAGE_KEY = "fancy_looks_erp_data";
const LOGS_KEY = "fancy_looks_erp_logs";
const ADMIN_PASSWORD = "Fancy2003";

let storageError = null;
let inventory = [];
let sales = [];
let billNo = 1;
let permStats = { dailyRevenue:0, monthlyRevenue:0, dailyProfit:0, monthlyProfit:0, lastDate:new Date().toLocaleDateString() };
let auditLogs = [];

let view = "billing";
let cart = [];
let isInvUnlocked = false;
let sidebarOpen = false;
let passModal = { show:false, title:"", action:null };
let aiChat = [{ q:null, a:"Namaskar Boss! Ami Sumit, apnar Smart Website Manager. Apnar business ar A-to-Z sob amar nokhodorpone ache! Customer details, stock alert, top sales, ba revenue jeta khushi jiges korun, ami fun ar sathe answer debo! Ekbar ask korei dekhun!" }];

function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function loadFromStorage(){
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      inventory = data.inventory || [];
      sales = data.sales || [];
      billNo = data.billNo || 1;
      permStats = data.permStats || permStats;
    }
    const logs = localStorage.getItem(LOGS_KEY);
    if (logs) auditLogs = JSON.parse(logs);
  } catch (err) {
    console.error(err);
    storageError = "Couldn't access saved data on this device/browser. Changes this session may not be saved.";
  }
}

function syncToStorage(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ inventory, sales, billNo, permStats }));
  } catch (err) {
    console.error(err);
    storageError = "Couldn't save data on this device/browser. Changes may be lost on refresh.";
  }
}

function addAuditLog(action, details){
  auditLogs = [{ date:new Date().toLocaleDateString(), isoDate:new Date().toISOString().split('T')[0], time:new Date().toLocaleTimeString(), action, details }, ...auditLogs];
  try { localStorage.setItem(LOGS_KEY, JSON.stringify(auditLogs)); } catch(err){ console.error(err); }
}

function requestAuth(title, action){ passModal = { show:true, title, action }; render(); setTimeout(()=>{ const el = document.getElementById('passInput'); if(el) el.focus(); }, 30); }
function closeAuth(){ passModal = { show:false, title:"", action:null }; render(); }
function confirmAuth(){
  const val = document.getElementById('passInput').value;
  if (val === ADMIN_PASSWORD) {
    const action = passModal.action;
    passModal = { show:false, title:"", action:null };
    if (action) action();
    render();
  } else {
    alert("Incorrect Password!");
  }
}

function getStockSummary(){
  const totalStockCount = inventory.reduce((a,i)=>a+i.qty,0);
  const grouped = {};
  inventory.forEach(item=>{
    const name = item.name.trim();
    if(!grouped[name]) grouped[name] = { total:0, items:[] };
    grouped[name].total += item.qty;
    grouped[name].items.push({ size:item.size, qty:item.qty });
  });
  return { totalStockCount, grouped };
}
function getSizeSummary(){
  const sizes = {};
  inventory.forEach(item=>{
    const s = item.size.trim().toUpperCase();
    sizes[s] = (sizes[s]||0) + item.qty;
  });
  return sizes;
}
function getMonthlyHistory(){
  const history = {};
  sales.forEach(s=>{
    const month = s.date.substring(0,7);
    if(!history[month]) history[month] = { rev:0, profit:0, count:0 };
    history[month].rev += s.total;
    const profit = s.items.reduce((p,i)=>p+((i.price-(i.purchasePrice||0))*i.sellQty),0);
    history[month].profit += profit;
    history[month].count += 1;
  });
  return Object.entries(history).map(([m,d])=>({month:m,...d})).sort((a,b)=>b.month.localeCompare(a.month));
}
function todayDisplayStats(){
  const today = new Date().toLocaleDateString();
  return {
    dailyRevenue: permStats.lastDate === today ? permStats.dailyRevenue : 0,
    dailyProfit: permStats.lastDate === today ? permStats.dailyProfit : 0
  };
}

function refillStock(id){
  const amount = prompt("How many units to add?");
  const qty = parseInt(amount);
  if(isNaN(qty) || qty<=0) return alert("Invalid amount!");
  const itm = inventory.find(i=>i.id===id);
  inventory = inventory.map(i=> i.id===id ? {...i, qty:i.qty+qty} : i);
  syncToStorage(); addAuditLog("refill", {id, name:itm.name, qty}); render();
}
function deductStock(id){
  const amount = prompt("How many units to remove?");
  const qty = parseInt(amount);
  if(isNaN(qty) || qty<=0) return alert("Invalid amount!");
  const itm = inventory.find(i=>i.id===id);
  if(qty > itm.qty) return alert("Error: Insufficient stock!");
  inventory = inventory.map(i=> i.id===id ? {...i, qty:i.qty-qty} : i);
  syncToStorage(); addAuditLog("deduct", {id, name:itm.name, qty}); render();
}
function editStockName(id, oldName){
  const newName = prompt("Enter new name for stock:", oldName);
  if(newName && newName.trim()!==""){
    inventory = inventory.map(i=> i.id===id ? {...i, name:newName.trim()} : i);
    syncToStorage(); addAuditLog("edit_name", {id, oldName, newName}); render();
  }
}
function deleteStockItem(id){
  if(confirm('Delete?')){
    inventory = inventory.filter(i=>i.id!==id);
    syncToStorage(); render();
  }
}
function handleResetInventory(){
  requestAuth("Clear Full Inventory", ()=>{
    if(confirm("Danger! Delete ALL stock items?")){ inventory = []; syncToStorage(); render(); }
  });
}
function addNewStock(e){
  e.preventDefault();
  const f = e.target;
  const newItem = { id:Date.now(), name:f.pname.value, size:f.psize.value, qty:parseInt(f.pqty.value), purchasePrice:parseFloat(f.buyprice.value), price:parseFloat(f.sellprice.value) };
  inventory = [...inventory, newItem];
  syncToStorage(); addAuditLog("add_new", {name:newItem.name, qty:newItem.qty});
  f.reset(); render();
}

function addToCart(id){
  const product = inventory.find(i=>i.id===id);
  if(!product) return;
  const alreadyInCart = (cart.find(c=>c.id===id)||{}).sellQty || 0;
  const remaining = product.qty - alreadyInCart;
  if(remaining <= 0) return alert("No more stock left to add for this item!");
  const input = prompt(`Enter Qty for ${product.name} (max ${remaining}):`, "1");
  const qty = parseInt(input);
  if(!qty || qty<=0 || qty>remaining) return alert("Invalid or Insufficient Stock!");
  const existing = cart.find(c=>c.id===id);
  if(existing){
    cart = cart.map(c=> c.id===id ? {...c, sellQty:c.sellQty+qty, subtotal:(c.sellQty+qty)*c.price} : c);
  } else {
    cart = [...cart, {...product, sellQty:qty, subtotal:product.price*qty}];
  }
  render();
}
function removeFromCart(id){ cart = cart.filter(c=>c.id!==id); render(); }

function finalizeBill(){
  const name = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  const address = document.getElementById('custAddress').value.trim();
  const date = document.getElementById('custDate').value || new Date().toISOString().split('T')[0];
  if(!name || cart.length===0) return alert("Fill Cart and Customer Info!");

  const total = cart.reduce((s,i)=>s+i.subtotal,0);
  const profit = cart.reduce((p,i)=>p+((i.price-(i.purchasePrice||0))*i.sellQty),0);
  const newSale = { billNo, customer:{name,phone,address}, total, method:"Cash", date, items:[...cart] };

  inventory = inventory.map(invItem=>{
    const sold = cart.find(c=>c.id===invItem.id);
    return sold ? {...invItem, qty:invItem.qty-sold.sellQty} : invItem;
  });
  sales = [newSale, ...sales];
  const today = new Date().toLocaleDateString();
  permStats = {
    ...permStats,
    dailyRevenue: permStats.lastDate===today ? permStats.dailyRevenue+total : total,
    dailyProfit: permStats.lastDate===today ? permStats.dailyProfit+profit : profit,
    monthlyRevenue: permStats.monthlyRevenue+total,
    monthlyProfit: permStats.monthlyProfit+profit,
    lastDate: today
  };
  billNo += 1;
  syncToStorage();
  cart = [];
  alert("Sale Completed!");
  render();
  document.getElementById('custName').value='';
  document.getElementById('custPhone').value='';
  document.getElementById('custAddress').value='';
  document.getElementById('custDate').value = new Date().toISOString().split('T')[0];
}

function resetAllData(){
  requestAuth("Reset All Analytics Data", ()=>{
    if(confirm("Are you sure you want to reset ALL revenue and profit data?")){
      permStats = { dailyRevenue:0, monthlyRevenue:0, dailyProfit:0, monthlyProfit:0, lastDate:new Date().toLocaleDateString() };
      syncToStorage(); render();
    }
  });
}
function downloadMonthlyData(){
  const data = getMonthlyHistory();
  if(data.length===0) return alert("No monthly data available to download.");
  let csv = "data:text/csv;charset=utf-8,Month,Total Bills,Total Revenue,Total Profit\n";
  data.forEach(row=>{ csv += `${row.month},${row.count},${row.rev},${row.profit}\n`; });
  const link = document.createElement("a");
  link.setAttribute("href", encodeURI(csv));
  link.setAttribute("download", "monthly_report.csv");
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
}
function deleteMonthData(monthStr){
  requestAuth(`Delete Data for ${monthStr}`, ()=>{
    sales = sales.filter(s=>s.date.substring(0,7)!==monthStr);
    syncToStorage(); render();
  });
}
function deleteBill(billN){
  requestAuth("Delete Bill", ()=>{
    sales = sales.filter(sl=>sl.billNo!==billN);
    syncToStorage(); render();
  });
}

// ---- AI BRAIN (SUMIT) ----
function processSumitAI(qStr){
  const q = qStr.toLowerCase();
  const todayISO = new Date().toISOString().split('T')[0];
  const todayLocal = new Date().toLocaleDateString();
  const dateMatch = q.match(/\d{4}-\d{2}-\d{2}/);
  const isToday = q.includes('aj') || q.includes('today') || q.includes('ajke');
  const targetDate = dateMatch ? dateMatch[0] : (isToday ? todayISO : null);
  const greetings = ["Boss! ", "Aha boss! ", "Sir, ", "Sumit bolchi, sunun! ", "Ekdom! "];
  const g = greetings[Math.floor(Math.random()*greetings.length)];
  const sizeSummary = getSizeSummary();
  const stockSummary = getStockSummary();
  const { dailyRevenue: displayedDailyRevenue, dailyProfit: displayedDailyProfit } = todayDisplayStats();

  if(q.includes('add korte')||q.includes('nei')||q.includes('nai')||q.includes('stock out')||q.includes('kom ache')||q.includes('ki ki stock add')){
    const low = inventory.filter(i=>i.qty<=1);
    if(low.length>0) return g+`Alert! Apnar ${low.length} ta item ar stock sesh ba ekei bare kom ache. Ekhuni order korun: ${low.map(i=>`${i.name} (Size: ${i.size})`).join(", ")}. Baki sob thik ache boss!`;
    return g+"Kono chaap nei boss! Sob stock ekhon full ache, konotai 1 er niche nei. Relax korun.";
  }
  if(q.includes('besi sale')||q.includes('top')||q.includes('best')||q.includes('bhalo sale')){
    const itemSales = {};
    sales.forEach(s=>s.items.forEach(i=>{ const key=`${i.name} (${i.size})`; itemSales[key]=(itemSales[key]||0)+i.sellQty; }));
    const sorted = Object.entries(itemSales).sort((a,b)=>b[1]-a[1]);
    if(sorted.length===0) return g+"Ekhono kono sale hoi ni boss, sale hole pakka best item bole debo!";
    return g+`Apnar sob theke besi sale hoche: 1. ${sorted[0][0]} (${sorted[0][1]} ta), 2. ${(sorted[1]||[])[0]||'N/A'} (${(sorted[1]||[])[1]||0} ta). Ekdom fatiye sale hocche!`;
  }
  if(q.includes('kom sale')||q.includes('least')||q.includes('kharap sale')){
    const itemSales = {};
    inventory.forEach(i=> itemSales[`${i.name} (${i.size})`] = 0);
    sales.forEach(s=>s.items.forEach(i=>{ const key=`${i.name} (${i.size})`; if(itemSales[key]!==undefined) itemSales[key]+=i.sellQty; }));
    const sorted = Object.entries(itemSales).sort((a,b)=>a[1]-b[1]).filter(i=>i[1]===0);
    if(sorted.length>0) return g+`Boss, ai item gulo ekhono aktao sale hoy ni: ${sorted.map(s=>s[0]).slice(0,5).join(", ")}. Eto bhalo product customer k dekhate hobe!`;
    return g+"Sob item e kichu na kichu sale hoyeche. Kono dead stock nei!";
  }
  if(q.includes('customer')||q.includes('address')||q.includes('phone')||q.includes('number')||q.includes('kineche')){
    const words = q.split(" ");
    let found = [];
    words.forEach(word=>{
      if(word.length>3 && !['kineche','address','customer','phone'].includes(word)){
        found = [...found, ...sales.filter(s=>s.customer.name.toLowerCase().includes(word) || (s.customer.phone||'').includes(word))];
      }
    });
    if(found.length>0){
      const c = found[0];
      return g+`Haa! Customer pelam. Name: ${c.customer.name}, Phone: ${c.customer.phone||'N/A'}, Address: ${c.customer.address||'N/A'}. Tara ${c.date} e total ₹${c.total} ar shopping korechilo. Items kinechilo: ${c.items.map(i=>i.name).join(", ")}.`;
    }
    if(q.includes('koto customer')) return g+`Amader total system a ekhon ${sales.length} jon unique bill/customer record ache!`;
    return g+"Ami customer scan korlam kintu ai nam/number theke kichu pelam na. Nam ba number thik kore likhun, ami khuje debo!";
  }
  if(q.includes('total stock')||q.includes('available')||q.includes('ki ki stock')||q.includes('koto size')||q.includes('size available')){
    let sz = Object.entries(sizeSummary).map(([s,qq])=>`Size ${s}: ${qq} ta`).join(", ");
    return g+`Amader system a ekhon total ${stockSummary.totalStockCount} ta product ready ache! Size onujayi details: ${sz}. Kono customer asle directly sell korte paren!`;
  }
  if(targetDate){
    const isLookingAtToday = isToday || targetDate===todayISO;
    const targetSales = sales.filter(s=>s.date===targetDate);
    const targetLogs = auditLogs.filter(l=> (isLookingAtToday && l.date===todayLocal) || l.isoDate===targetDate || l.date===targetDate);
    let addedQty = 0;
    targetLogs.forEach(l=>{ if(l.action==='refill'||l.action==='add_new') addedQty += (l.details.qty||0); });
    let dayRev = targetSales.reduce((acc,s)=>acc+s.total,0);
    let dayProf = targetSales.reduce((acc,s)=>acc+s.items.reduce((p,i)=>p+((i.price-(i.purchasePrice||0))*i.sellQty),0),0);

    if(isLookingAtToday && q.includes('profit')) return g+`Ajker (Live) total profit hocche: ₹${displayedDailyProfit}`;
    if(isLookingAtToday && (q.includes('rev')||q.includes('taka')||q.includes('sale'))) return g+`Ajker total revenue/sell holo: ₹${displayedDailyRevenue}`;
    if(q.includes('profit')) return g+`${targetDate} tarikhe boss, amader total profit chilo: ₹${dayProf}`;
    if(q.includes('bill')) return g+`${targetDate} tarikhe total ${targetSales.length} ta bill ketechilam amra.`;
    if(q.includes('add')||q.includes('item')||q.includes('stock')) return g+`${targetDate} a amra stock e total ${addedQty} ta item add korechi (+ icon and new add miliye).`;
    return g+`${targetDate} ar full summary: Total Bill holo ${targetSales.length} ta. Total Revenue chilo ₹${isLookingAtToday?displayedDailyRevenue:dayRev}. Profit asche ₹${isLookingAtToday?displayedDailyProfit:dayProf}. And oi dine stock add hoyeche ${addedQty} ta. Sob hisab clear Boss!`;
  }
  return "Boss! Ami Sumit. Apni amake jekono bhabe question korte paren. Example: 'aj koto profit holo?', 'total stock koto ache?', 'kon stock besi sale hoche?', 'ki ki stock add korte hobe?', ba 'Rohan name customer ki ki kineche?'. Ami ekhankar A to Z sab jani!";
}
function submitAiQuery(text){
  if(!text || !text.trim()) return;
  const response = processSumitAI(text);
  aiChat = [...aiChat, {q:text, a:response}];
  render();
  setTimeout(()=>{ const body=document.getElementById('chatBody'); if(body) body.scrollTop = body.scrollHeight; }, 30);
}
function handleAiSubmit(e){
  e.preventDefault();
  const input = document.getElementById('aiInput');
  const text = input.value;
  input.value = "";
  submitAiQuery(text);
}

// ---- Search (live filter without full re-render, keeps input focus) ----
function filterBillingProducts(q){
  const grid = document.getElementById('productGrid');
  if(!grid) return;
  grid.innerHTML = renderProductCards(q);
}
function filterStockTable(q){
  const tbody = document.getElementById('stockTableBody');
  if(!tbody) return;
  tbody.innerHTML = renderStockRows(q);
}

function setView(v){ view=v; sidebarOpen=false; render(); }
function unlockInventory(){
  requestAuth("Unlock Inventory", ()=>{ isInvUnlocked = true; view = 'inventory'; });
  sidebarOpen = false;
}
function toggleSidebar(open){ sidebarOpen = open; render(); }

function icon(name){
  const map = { scissors:'✂️', receipt:'🧾', boxes:'📦', invoice:'📋', chart:'📊', brain:'🧠', search:'🔍',
    bars:'☰', plus:'＋', minus:'－', pencil:'✎', trash:'🗑', robot:'🤖', bolt:'⚡', send:'➤',
    power:'⏻', download:'⬇️', cash:'💰', rocket:'🚀', calendar:'📅', coins:'🪙', warn:'⚠️', dot:'●', close:'✕' };
  return map[name] || '';
}

function renderProductCards(filter){
  const list = inventory.filter(i=>i.name.toLowerCase().includes((filter||"").toLowerCase()));
  if(list.length===0) return `<div class="empty">No products found</div>`;
  return `<div class="grid grid-4" style="grid-template-columns:repeat(auto-fill,minmax(140px,1fr));">` + list.map(item=>`
    <div class="product-card ${item.qty<=1?'pulse-red':'pulse-green'}" onclick="addToCart(${item.id})">
      <div class="pname">${escapeHtml(item.name)}</div>
      <div class="psize">${escapeHtml(item.size)}</div>
      <div class="prow">
        <span class="price">₹${item.price}</span>
        <span class="badge ${item.qty<=1?'badge-red':'badge-green'}">${item.qty} left</span>
      </div>
    </div>`).join('') + `</div>`;
}

function renderStockRows(filter){
  const list = inventory.filter(i=>i.name.toLowerCase().includes((filter||"").toLowerCase()));
  if(list.length===0) return `<tr><td colspan="3" class="empty">No stock found</td></tr>`;
  return list.map(item=>`
    <tr>
      <td><b>${escapeHtml(item.name)}</b><br><span style="font-size:10px;color:#64748b;">${escapeHtml(item.size)}</span></td>
      <td>₹${item.price} <span class="badge ${item.qty<=1?'badge-red':'badge-green'}" style="margin-left:6px;">${item.qty} left</span></td>
      <td>
        <div style="display:flex; gap:6px;">
          <button class="icon-btn btn-green" onclick="refillStock(${item.id})" title="Add stock">${icon('plus')}</button>
          <button class="icon-btn btn-orange" onclick="deductStock(${item.id})" title="Remove stock">${icon('minus')}</button>
          <button class="icon-btn btn-blue" onclick="editStockName(${item.id}, '${escapeHtml(item.name).replace(/'/g,"\\'")}')" title="Edit name">${icon('pencil')}</button>
          <button class="icon-btn btn-danger" onclick="deleteStockItem(${item.id})" title="Delete">${icon('trash')}</button>
        </div>
      </td>
    </tr>`).join('');
}

function renderSidebar(){
  return `
  <aside class="sidebar ${sidebarOpen?'open':''}">
    <div class="brand"><div class="logo">${icon('scissors')}</div><h1>Fancy Looks</h1></div>
    <nav>
      <button class="nav-item ${view==='billing'?'active':''}" onclick="setView('billing')">${icon('receipt')} POS Billing</button>
      <button class="nav-item ${view==='inventory'?'active':''}" onclick="unlockInventory()">${icon('boxes')} Stock Manager</button>
      <button class="nav-item ${view==='all-bills'?'active':''}" onclick="setView('all-bills')">${icon('invoice')} Recent Bills</button>
      <button class="nav-item ${view==='reports'?'active':''}" onclick="setView('reports')">${icon('chart')} Analytics</button>
      <button class="nav-item ${view==='ai-brain'?'active':''}" onclick="setView('ai-brain')">${icon('brain')} AI Brain (Sumit)</button>
    </nav>
  </aside>`;
}

function renderBilling(){
  const todayStr = new Date().toISOString().split('T')[0];
  return `
  <div class="billing-layout">
    <div>
      <div class="card grid grid-4" style="margin-bottom:16px;">
        <input id="custName" placeholder="Name">
        <input id="custPhone" placeholder="Phone">
        <input id="custAddress" placeholder="Address">
        <input id="custDate" type="date" value="${todayStr}">
      </div>
      <div id="productGrid" style="max-height:55vh; overflow-y:auto; padding-right:4px;">${renderProductCards("")}</div>
    </div>
    <div>
      <div class="card">
        <h3 style="margin-top:0;">Cart List</h3>
        <div style="max-height:30vh; overflow-y:auto; margin-bottom:14px;">
          ${cart.length===0 ? '<div class="empty" style="padding:20px;">Cart is empty</div>' : cart.map(c=>`
            <div class="cart-row">
              <span>${escapeHtml(c.name)} (${escapeHtml(c.size)}) x${c.sellQty}</span>
              <span style="display:flex; align-items:center; gap:10px;">
                <b style="color:var(--primary);">₹${c.subtotal}</b>
                <button onclick="removeFromCart(${c.id})" style="border:none;background:none;color:#f87171;cursor:pointer;font-size:14px;">${icon('close')}</button>
              </span>
            </div>`).join('')}
        </div>
        <div style="display:flex; justify-content:space-between; padding-top:14px; border-top:1px solid #e2e8f0; margin-bottom:18px;">
          <span style="color:#94a3b8; font-weight:700;">Total Amount</span>
          <span style="font-size:20px; font-weight:900; color:var(--primary);">₹${cart.reduce((s,i)=>s+i.subtotal,0)}</span>
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="finalizeBill()">FINALIZE BILL</button>
      </div>
    </div>
  </div>`;
}

function renderInventory(){
  if(!isInvUnlocked) return `<div class="empty">Locked. Click Stock Manager again to unlock.</div>`;
  const stockSummary = getStockSummary();
  const sizeSummary = getSizeSummary();
  return `
  <div>
    <div class="card" style="border-left:6px solid var(--primary); margin-bottom:16px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
        <h3 style="margin:0;">Stock Summary</h3>
        <span class="badge" style="background:var(--primary);">Total Units: ${stockSummary.totalStockCount}</span>
      </div>
      <div class="grid grid-3" style="margin-bottom:14px;">
        ${Object.entries(stockSummary.grouped).map(([name,data])=>`
          <div class="card ${data.total<=1?'pulse-red':'pulse-green'}" style="padding:14px;">
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid #e2e8f0; padding-bottom:8px; margin-bottom:8px; font-weight:800; font-size:12px; text-transform:uppercase;">
              <span style="color:var(--primary);">${escapeHtml(name)}</span>
              <span style="color:${data.total<=1?'#dc2626':'#16a34a'};">Total: ${data.total}</span>
            </div>
            ${data.items.map(it=>`<div style="display:flex; justify-content:space-between; font-size:10px; font-weight:700; color:#64748b;"><span>Size: ${escapeHtml(it.size)}</span><span style="color:${it.qty<=1?'#ef4444':'#22c55e'};">${it.qty} Qty</span></div>`).join('')}
          </div>`).join('') || '<div class="empty">No stock yet</div>'}
      </div>
      <div style="border-top:1px solid #e2e8f0; padding-top:14px;">
        <div style="font-size:11px; font-weight:700; color:#475569; margin-bottom:8px;">Total Stock Items By Size:</div>
        <div style="display:flex; flex-wrap:wrap; gap:8px;">
          ${Object.entries(sizeSummary).map(([sz,q])=>`<span class="badge" style="background:#1e293b;">Size ${escapeHtml(sz)} : <span style="color:#34d399;">${q}</span> pcs</span>`).join('')}
        </div>
      </div>
    </div>

    <div style="margin-bottom:16px;">
      <button class="btn btn-danger" onclick="handleResetInventory()">RESET INVENTORY</button>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <h3 style="margin-top:0;">Add New Product</h3>
      <form onsubmit="addNewStock(event)" class="grid grid-3">
        <input name="pname" required placeholder="Name">
        <input name="psize" required placeholder="Size">
        <input name="pqty" required type="number" placeholder="Qty">
        <input name="buyprice" required type="number" placeholder="Buy ₹">
        <input name="sellprice" required type="number" placeholder="Sell ₹">
        <button class="btn" style="background:#0f172a; color:#fff;">ADD STOCK</button>
      </form>
    </div>

    <div class="card">
      <input placeholder="Search stock by name..." style="margin-bottom:14px;" oninput="filterStockTable(this.value)">
      <table>
        <thead><tr><th>Product</th><th>Stock</th><th>Manage</th></tr></thead>
        <tbody id="stockTableBody">${renderStockRows("")}</tbody>
      </table>
    </div>
  </div>`;
}

function renderBills(){
  return `
  <div class="card" style="overflow-x:auto;">
    <table style="min-width:900px;">
      <thead><tr><th>Date</th><th>Bill#</th><th>Customer</th><th>Phone</th><th>Address</th><th>Products</th><th>Total</th><th>Action</th></tr></thead>
      <tbody>
        ${sales.length===0 ? `<tr><td colspan="8" class="empty">No recent bills found</td></tr>` : sales.map(s=>`
          <tr>
            <td>${escapeHtml(s.date)}</td>
            <td><b style="color:var(--primary);">#${s.billNo}</b></td>
            <td><b>${escapeHtml(s.customer.name)}</b></td>
            <td>${escapeHtml(s.customer.phone||'N/A')}</td>
            <td class="truncate" title="${escapeHtml(s.customer.address||'')}">${escapeHtml(s.customer.address||'N/A')}</td>
            <td>${s.items.map(it=>`<span class="badge" style="background:#e2e8f0; color:#334155; margin:2px;">${escapeHtml(it.name)} (${escapeHtml(it.size)}) x${it.sellQty}</span>`).join('')}</td>
            <td><b style="color:#16a34a;">₹${s.total}</b></td>
            <td><button class="icon-btn btn-danger" onclick="deleteBill(${s.billNo})">${icon('trash')}</button></td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderReports(){
  const monthly = getMonthlyHistory();
  const { dailyRevenue, dailyProfit } = todayDisplayStats();
  const statCard = (label,val,ic) => `
    <div class="card stat"><div class="ic">${icon(ic)}</div><div><div class="lbl">${label}</div><div class="val">₹${val}</div></div></div>`;
  return `
  <div>
    <div class="grid grid-4" style="margin-bottom:16px;">
      ${statCard('Today Rev', dailyRevenue, 'cash')}
      ${statCard('Today Prof', dailyProfit, 'rocket')}
      ${statCard('Month Rev', permStats.monthlyRevenue, 'calendar')}
      ${statCard('Month Prof', permStats.monthlyProfit, 'coins')}
    </div>
    <div style="display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap;">
      <button class="btn btn-danger" onclick="resetAllData()">${icon('power')} Reset Today & Month Data</button>
      <button class="btn btn-blue" onclick="downloadMonthlyData()">${icon('download')} Download Monthly Report</button>
    </div>
    <div class="card">
      <div style="font-weight:800; margin-bottom:12px;">Monthly History Data</div>
      <table>
        <thead><tr><th>Month</th><th>Bills</th><th>Revenue</th><th>Profit</th><th>Action</th></tr></thead>
        <tbody>
          ${monthly.length===0 ? `<tr><td colspan="5" class="empty">No monthly history yet</td></tr>` : monthly.map(d=>`
            <tr>
              <td><b>${d.month}</b></td><td>${d.count}</td>
              <td><b style="color:#2563eb;">₹${d.rev}</b></td>
              <td><b style="color:#16a34a;">₹${d.profit}</b></td>
              <td><button class="icon-btn btn-danger" onclick="deleteMonthData('${d.month}')">${icon('trash')}</button></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function renderAiBrain(){
  return `
  <div class="chat-wrap">
    <div class="chat-head">
      <div class="chat-avatar">${icon('robot')}</div>
      <div><h3 style="margin:0;">Sumit AI</h3><p style="margin:2px 0 0; font-size:11px; color:#16a34a; font-weight:700;">${icon('dot')} Always Active &amp; Scanning System</p></div>
    </div>
    <div class="chips">
      <span style="font-size:11px; color:#94a3b8; font-weight:700;">${icon('bolt')} Quick Ask:</span>
      <button class="chip" onclick="submitAiQuery('Aj koto profit holo?')">Today Profit?</button>
      <button class="chip" onclick="submitAiQuery('Ki ki stock add korte hobe?')">Alert Stock?</button>
      <button class="chip" onclick="submitAiQuery('Kon stock besi sale hocche?')">Top Selling Items</button>
      <button class="chip" onclick="submitAiQuery('Total stock koto ache?')">Total Stock Status</button>
    </div>
    <div class="chat-body" id="chatBody">
      ${aiChat.map(chat=>`
        ${chat.q ? `<div class="bubble bubble-user">${escapeHtml(chat.q)}</div>` : ''}
        ${chat.a ? `<div class="bubble-ai-wrap"><div class="ai-mini">${icon('robot')}</div><div class="bubble bubble-ai">${escapeHtml(chat.a)}</div></div>` : ''}
      `).join('')}
    </div>
    <form class="chat-foot" onsubmit="handleAiSubmit(event)">
      <input id="aiInput" placeholder="Ask Sumit anything... (e.g. 'Customer Rakesh ki kineche?')" style="flex:1;">
      <button type="submit" class="btn btn-primary">${icon('send')}</button>
    </form>
  </div>`;
}

function renderMain(){
  if(view==='billing') return renderBilling();
  if(view==='inventory') return renderInventory();
  if(view==='all-bills') return renderBills();
  if(view==='reports') return renderReports();
  if(view==='ai-brain') return renderAiBrain();
  return '';
}

function viewTitle(){
  return { billing:'POS Billing', inventory:'Stock Manager', 'all-bills':'Recent Bills', reports:'Analytics', 'ai-brain':'AI Brain' }[view] || view;
}

function render(){
  const root = document.getElementById('root');
  root.innerHTML = `
    ${storageError ? `<div class="warn-banner">${icon('warn')} ${escapeHtml(storageError)} <button onclick="storageError=null;render();" style="margin-left:10px;border:none;background:none;color:#92400e;font-weight:900;cursor:pointer;">${icon('close')}</button></div>` : ''}
    ${passModal.show ? `
      <div class="modal-bg">
        <div class="modal-box">
          <h3 style="margin-top:0;">${escapeHtml(passModal.title)}</h3>
          <input id="passInput" type="password" placeholder="Password" style="text-align:center; font-weight:700; margin-bottom:16px;" onkeydown="if(event.key==='Enter') confirmAuth();">
          <div style="display:flex; gap:12px;">
            <button class="btn btn-light" style="flex:1;" onclick="closeAuth()">Cancel</button>
            <button class="btn btn-primary" style="flex:1;" onclick="confirmAuth()">Verify</button>
          </div>
        </div>
      </div>` : ''}
    ${renderSidebar()}
    <main class="main">
      <div class="topbar">
        <button class="hamburger" onclick="toggleSidebar(true)">${icon('bars')}</button>
        <h2>${viewTitle()}</h2>
        ${view==='billing' ? `<input placeholder="Search product..." style="max-width:240px;" oninput="filterBillingProducts(this.value)">` : ''}
      </div>
      ${renderMain()}
    </main>
  `;
}

loadFromStorage();
render();
</script>
